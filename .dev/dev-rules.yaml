# Development Rules and Workflow
version: 1.0.0
name: "Marksmith Development Rules"
description: "Comprehensive rules for Marksmith development workflow"

# Core Development Rules
rules:
  - id: "conventional-commits"
    description: "All commits must follow Conventional Commits specification"
    severity: high
    enabled: true
    details:
      - "Use format: <type>(<scope>): <description>"
      - "Types: feat, fix, docs, style, refactor, perf, test, chore"
      - "Scope is optional but recommended"
      - "Description should be concise and imperative"
  
  - id: "branch-naming"
    description: "Branch names must follow standardized format"
    severity: medium
    enabled: true
    details:
      - "Format: <type>/<issue-number>-<short-description>"
      - "Example: feat/123-add-dark-mode"
      - "Types: feat, fix, docs, refactor, test, chore"
  
  - id: "pr-requirements"
    description: "Pull Request requirements"
    severity: high
    enabled: true
    details:
      - "Minimum 1 approval required"
      - "Must pass all CI checks"
      - "Must include proper description"
      - "Must reference related issues"
  
  - id: "code-review"
    description: "Mandatory code review process"
    severity: high
    enabled: true
    details:
      - "All changes must be reviewed"
      - "Reviewers must check for security, performance, and best practices"
      - "Address all review comments before merging"
  
  - id: "testing"
    description: "Comprehensive testing requirements"
    severity: high
    enabled: true
    details:
      - "Minimum 80% test coverage for new features"
      - "Unit tests for all critical functions"
      - "Integration tests for major workflows"
      - "Regression tests for bug fixes"
  
  - id: "documentation"
    description: "Documentation requirements"
    severity: medium
    enabled: true
    details:
      - "Update documentation for all new features"
      - "Add inline code comments for complex logic"
      - "Update README for major changes"
      - "Document API changes"

# Workflow Integration
workflow:
  integration:
    - "dev-cycle.flow.yaml"
    - "review.flow.yaml"
    - "release.flow.yaml"
  
# Agent Configuration
agents:
  codegen:
    rules:
      - "conventional-commits"
      - "testing"
      - "documentation"
  
  tester:
    rules:
      - "testing"
      - "code-review"
  
  reviewer:
    rules:
      - "pr-requirements"
      - "code-review"
      - "documentation"

# Exception Handling
exceptions:
  - paths: ".dev/**"
    rules_exempt: ["conventional-commits", "testing"]
    reason: "Dev directory is auto-managed"
  
  - paths: ".compost/**"
    rules_exempt: ["all"]
    reason: "Compost directory is temporary storage"
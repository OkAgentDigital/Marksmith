# Unified Todo System for Marksmith
version: 1.0.0
name: "Marksmith Development Todos"
description: "Consolidated todo system integrating backlog and in-progress tasks"

# Priority System
priority_levels:
  - name: "critical"
    description: "Blocks development, must be addressed immediately"
    color: "red"
  
  - name: "high"
    description: "Important features or bugs, should be addressed soon"
    color: "orange"
  
  - name: "medium"
    description: "Normal priority tasks"
    color: "yellow"
  
  - name: "low"
    description: "Nice to have, can wait"
    color: "blue"

# Status System
status_levels:
  - name: "backlog"
    description: "Not yet started"
  
  - name: "planned"
    description: "Scheduled for upcoming sprint"
  
  - name: "in_progress"
    description: "Currently being worked on"
  
  - name: "blocked"
    description: "Cannot proceed due to dependencies"
  
  - name: "review"
    description: "Completed, awaiting review"
  
  - name: "completed"
    description: "Finished and verified"

# Unified Todo List
